<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHERWISE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Geçişleri yumuşatmak için animasyon */
        .story-card { transition: all 0.8s ease-in-out; }
    </style>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen m-0 font-sans">

    <div id="main-card" class="story-card relative w-full max-w-sm h-[750px] bg-gradient-to-b from-gray-700 to-gray-900 rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col justify-between p-8 border-4 border-white/10">
        
        <div class="text-white">
            <div class="flex justify-between items-start">
                <div>
                    <h2 class="text-lg font-medium opacity-80 mb-1" id="location">📍 Konum...</h2>
                    <h1 class="text-7xl font-black tracking-tighter" id="temp">--°</h1>
                </div>
                <div class="bg-white/20 backdrop-blur-md p-3 rounded-2xl text-2xl" id="weather-icon">⏳</div>
            </div>
            
            <div class="flex gap-4 mt-6">
                <div class="bg-black/20 backdrop-blur-sm px-4 py-2 rounded-full text-sm font-bold" id="wind">💨 -- km/s</div>
                <div class="bg-black/20 backdrop-blur-sm px-4 py-2 rounded-full text-sm font-bold" id="precip">☔ %--</div>
            </div>
        </div>

        <div class="bg-white/15 backdrop-blur-xl rounded-3xl p-6 mb-4 border border-white/20 shadow-xl">
            <p class="text-white text-2xl font-bold leading-tight italic" id="story-text">
                Hava durumu analiz ediliyor...
            </p>
            <div class="w-12 h-1 bg-white/40 mt-4 rounded-full"></div>
        </div>
    </div>

    <script>
        const moodStyles = {
            clear: { bg: "from-blue-400 to-blue-600", icon: "☀️" },
            rainy: { bg: "from-indigo-700 to-slate-900", icon: "🌧️" },
            cold: { bg: "from-cyan-200 to-blue-500", icon: "❄️" },
            sunny: { bg: "from-orange-400 to-red-500", icon: "🔥" },
            cloudy: { bg: "from-gray-400 to-gray-600", icon: "☁️" }
        };

        async function updateWeather() {
            try {
                const res = await fetch('http://127.0.0.1:8000/api/story');
                const data = await res.json();

                // Verileri Yazdır
                document.getElementById('location').innerText = "📍 " + data.location;
                document.getElementById('temp').innerText = data.current_temp + "°";
                document.getElementById('wind').innerText = "💨 " + data.wind_kmh + " km/s";
                document.getElementById('precip').innerText = "☔ %" + data.precip_prob;
                document.getElementById('story-text').innerText = `"${data.story_text}"`;

                // Görseli Güncelle
                const style = moodStyles[data.mood] || moodStyles.clear;
                const card = document.getElementById('main-card');
                card.className = `story-card relative w-full max-w-sm h-[750px] bg-gradient-to-b ${style.bg} rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col justify-between p-8 border-4 border-white/10`;
                document.getElementById('weather-icon').innerText = style.icon;

            } catch (e) {
                document.getElementById('story-text').innerText = "Bağlantı hatası! Lütfen backend'i kontrol et.";
            }
        }

        updateWeather();
    </script>
</body>
</html>
